<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Floor France — Live</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface-2: #1e293b;
    --border: rgba(255,255,255,0.06);
    --text: #ffffff;
    --text-dim: #cbd5e1;
    --text-faint: #6b7280;

    --booked:    #818cf8;
    --qualified: #34d399;
    --target:    #fbbf24;

    --team-1: #818cf8;
    --team-2: #34d399;
    --team-3: #fb923c;
    --team-4: #f472b6;
    --team-5: #60a5fa;

    --gold: #fbbf24;
    --silver: #d1d5db;
    --bronze: #c08457;

    --good: #34d399;
    --mid:  #fbbf24;
    --bad:  #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .wallboard {
    height: 100vh;
    width: 100vw;
    padding: 1.6vh 1.4vw;
    display: flex;
    flex-direction: column;
    gap: 1.4vh;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 1.2vh;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-left .label {
    font-size: 0.75vw;
    letter-spacing: 0.25vw;
    color: var(--text-faint);
    text-transform: uppercase;
  }
  .header-left .title {
    font-size: 1.8vw;
    font-weight: 500;
    margin-top: 0.3vh;
  }
  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.3vh;
  }
  .clock {
    font-size: 1.8vw;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .live {
    display: flex;
    align-items: center;
    gap: 0.5vw;
    font-size: 0.75vw;
    color: var(--text-dim);
  }
  .live-dot {
    width: 0.6vw;
    height: 0.6vw;
    border-radius: 50%;
    background: #10b981;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .teams {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.9vw;
    flex-shrink: 0;
  }
  .team-card {
    background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
    border-radius: 0.8vw;
    padding: 1.6vh 1.1vw;
    border-top: 3px solid var(--team-color);
    display: flex;
    flex-direction: column;
    gap: 1vh;
  }
  .team-card.t1 { --team-color: var(--team-1); }
  .team-card.t2 { --team-color: var(--team-2); }
  .team-card.t3 { --team-color: var(--team-3); }
  .team-card.t4 { --team-color: var(--team-4); }
  .team-card.t5 { --team-color: var(--team-5); }

  .team-name {
    font-size: 1.05vw;
    font-weight: 500;
    color: var(--team-color);
    letter-spacing: 0.1vw;
    text-transform: uppercase;
    padding-bottom: 0.7vh;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .team-sdr-count {
    font-size: 0.7vw;
    color: var(--text-faint);
    letter-spacing: normal;
    text-transform: none;
  }

  .metric-block {
    display: flex;
    flex-direction: column;
    gap: 0.5vh;
  }
  .metric-label {
    font-size: 0.72vw;
    letter-spacing: 0.12vw;
    color: var(--metric-color);
    text-transform: uppercase;
    font-weight: 500;
  }
  .metric-block.booked    { --metric-color: var(--booked); }
  .metric-block.qualified { --metric-color: var(--qualified); }

  .metric-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4vw;
    align-items: baseline;
  }
  .metric-cell {
    display: flex;
    flex-direction: column;
    gap: 0.3vh;
  }
  .metric-value {
    font-size: 2vw;
    font-weight: 500;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--metric-color);
  }
  .metric-cell.dim .metric-value {
    font-size: 1.4vw;
    color: var(--text-dim);
  }
  .metric-period {
    font-size: 0.65vw;
    color: var(--text-faint);
    letter-spacing: 0.05vw;
    text-transform: uppercase;
  }

  /* Target progress on team card */
  .team-target {
    display: flex;
    flex-direction: column;
    gap: 0.6vh;
    padding-top: 0.8vh;
    border-top: 1px solid var(--border);
  }
  .team-target-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .team-target-label {
    font-size: 0.7vw;
    color: var(--target);
    letter-spacing: 0.12vw;
    text-transform: uppercase;
    font-weight: 500;
  }
  .team-target-pct {
    font-size: 1.2vw;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--pct-color);
  }
  .team-target-pct.good { --pct-color: var(--good); }
  .team-target-pct.mid  { --pct-color: var(--mid); }
  .team-target-pct.bad  { --pct-color: var(--bad); }
  .team-target-detail {
    font-size: 0.7vw;
    color: var(--text-faint);
  }
  .team-target-bar {
    height: 0.7vh;
    background: rgba(255,255,255,0.05);
    border-radius: 0.35vh;
    overflow: hidden;
  }
  .team-target-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--target), #f59e0b);
    transition: width 0.8s ease;
  }

  /* Leaderboard */
  .leaderboard-wrap {
    background: var(--surface);
    border-radius: 0.8vw;
    padding: 1.4vh 1.2vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .lb-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1.2vh;
    padding-bottom: 1vh;
    border-bottom: 1px solid var(--border);
  }
  .lb-title {
    font-size: 1.3vw;
    font-weight: 500;
  }
  .lb-meta {
    font-size: 0.75vw;
    color: var(--text-faint);
    letter-spacing: 0.15vw;
    text-transform: uppercase;
  }
  .lb-legend {
    font-size: 0.75vw;
    color: var(--text-faint);
    letter-spacing: 0.08vw;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.4vw;
  }
  .lb-legend-dot {
    width: 0.6vw;
    height: 0.6vw;
    border-radius: 50%;
    display: inline-block;
  }
  .lb-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-auto-rows: 1fr;
    grid-auto-flow: column;
    gap: 0 2vw;
    flex: 1;
    align-content: stretch;
    overflow: hidden;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 2vw 1fr 5vw 2.4vw 2.4vw 2.5vw;
    align-items: center;
    gap: 0.5vw;
    padding: 0;
    border-bottom: 1px solid var(--border);
    min-height: 0;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank {
    width: 1.5vw;
    height: 1.5vw;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 500;
    font-size: 0.7vw;
    background: rgba(255,255,255,0.04);
    color: var(--text-faint);
  }
  .lb-rank.gold {
    background: linear-gradient(135deg, var(--gold), #f59e0b);
    color: var(--bg);
  }
  .lb-rank.silver { background: rgba(209,213,219,0.18); color: var(--silver); }
  .lb-rank.bronze { background: rgba(192,132,87,0.22); color: var(--bronze); }

  .lb-name-block {
    display: flex;
    flex-direction: column;
    gap: 0.05vh;
    overflow: hidden;
  }
  .lb-name {
    font-size: 0.8vw;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lb-team {
    font-size: 0.55vw;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .lb-progress-bar {
    height: 0.4vh;
    background: rgba(255,255,255,0.05);
    border-radius: 0.25vh;
    overflow: hidden;
  }
  .lb-progress-fill {
    height: 100%;
    background: var(--bar-color);
    transition: width 0.8s ease;
  }
  .lb-pct {
    font-size: 0.7vw;
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--pct-color);
  }
  .lb-value {
    font-size: 1vw;
    font-weight: 500;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--good);
  }
  .lb-scheduled {
    font-size: 0.9vw;
    font-weight: 400;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: #93c5fd;
  }
  .lb-target {
    font-size: 0.6vw;
    color: var(--text-faint);
    text-align: right;
  }

  .pct-good { --pct-color: var(--good); --bar-color: var(--good); }
  .pct-mid  { --pct-color: var(--mid);  --bar-color: var(--mid); }
  .pct-bad  { --pct-color: var(--bad);  --bar-color: var(--bad); }

  /* Celebration */
  .celebration {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    background: rgba(10,14,26,0.9);
    transition: opacity 0.4s;
  }
  .celebration.show { opacity: 1; }
  .celebration-card {
    text-align: center;
    transform: scale(0.5);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .celebration.show .celebration-card { transform: scale(1); }
  .celebration-emoji { font-size: 7vw; margin-bottom: 1.5vh; }
  .celebration-title {
    font-size: 3.5vw;
    font-weight: 500;
    background: linear-gradient(135deg, var(--gold), #f59e0b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .celebration-name { font-size: 2.6vw; font-weight: 500; margin-top: 1vh; }
  .celebration-meta { font-size: 1.3vw; color: var(--text-dim); margin-top: 0.6vh; }

  .empty {
    color: var(--text-faint);
    text-align: center;
    padding: 4vh;
    font-size: 1vw;
  }
</style>
</head>
<body>

<div class="wallboard">
  <div class="header">
    <div class="header-left">
      <div class="label">SDR Performance France — Live</div>
      <div class="title" id="header-title">SDR Wallboard</div>
    </div>
    <div class="header-right">
      <div class="clock" id="clock">--:--</div>
      <div class="live"><span class="live-dot"></span><span id="refresh-status">Connecting...</span></div>
    </div>
  </div>

  <div class="teams" id="teams"></div>

  <div class="leaderboard-wrap">
    <div class="lb-header">
      <div class="lb-title">All SDRs · This Month</div>
      <div style="display:flex;gap:1.5vw;align-items:baseline;">
        <div class="lb-legend"><span class="lb-legend-dot" style="background:#93c5fd;"></span>Scheduled</div>
        <div class="lb-legend"><span class="lb-legend-dot" style="background:var(--good);"></span>Qualified</div>
      </div>
    </div>
    <div class="lb-grid" id="leaderboard"></div>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-card">
    <div class="celebration-emoji">🎉</div>
    <div class="celebration-title">Demo Qualified!</div>
    <div class="celebration-name" id="celeb-name">—</div>
    <div class="celebration-meta" id="celeb-team">—</div>
  </div>
</div>

<script>
  const DATA_URL = 'https://script.google.com/macros/s/AKfycbwh9QRQr5QcIvrMCcNFJU9A6xQGXWnENn5N2TYuQJHkjvm9LtdpnfRwZ2G0S0UKhSdg/exec';
  const REFRESH_SECONDS = 60;
  const LEADERBOARD_SIZE = 999; // show all SDRs
  const TEAM_ORDER = ['UK/I EMS', 'UK/I PDM', 'UK/I OEE', 'NORDICS', 'BENELUX'];

  let data = null;
  let prevQualifiedTotal = null;

  function tickClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    document.getElementById('clock').textContent = hh + ':' + mm;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('header-title').textContent =
      days[d.getDay()] + ' · ' + d.getDate() + ' ' + months[d.getMonth()];
  }
  setInterval(tickClock, 1000);
  tickClock();

  async function fetchData() {
    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      data = await res.json();
      const ago = Math.round((Date.now() - new Date(data.generatedAt).getTime()) / 1000);
      document.getElementById('refresh-status').textContent = 'Live · refreshed ' + ago + 's ago';
      checkForCelebration();
      render();
    } catch (e) {
      document.getElementById('refresh-status').textContent = 'Connection error';
      console.error(e);
    }
  }

  function checkForCelebration() {
    if (!data) return;
    const currentQualified = data.totals.qualified.d;
    if (prevQualifiedTotal !== null && currentQualified > prevQualifiedTotal) {
      const top = [...(data.sdrs || [])].sort((a, b) => b.qualified.d - a.qualified.d)[0];
      if (top) {
        document.getElementById('celeb-name').textContent = top.name;
        document.getElementById('celeb-team').textContent = top.team;
        const cel = document.getElementById('celebration');
        cel.classList.add('show');
        setTimeout(() => cel.classList.remove('show'), 5000);
      }
    }
    prevQualifiedTotal = currentQualified;
  }

  function pctClass(pct) {
    if (pct >= 80) return 'pct-good';
    if (pct >= 50) return 'pct-mid';
    return 'pct-bad';
  }

  function render() {
    if (!data) return;
    renderTeams();
    renderLeaderboard();
  }

  function renderTeams() {
    const teamsById = {};
    (data.teams || []).forEach(t => { teamsById[t.team] = t; });

    const html = TEAM_ORDER.map((teamName, i) => {
      const t = teamsById[teamName] || {
        team: teamName,
        booked:    { d:0, w:0, m:0 },
        qualified: { d:0, w:0, m:0 },
        monthlyTarget: 0,
        sdrCount: 0
      };
      const targetPct = t.monthlyTarget > 0 ? Math.round((t.qualified.m / t.monthlyTarget) * 100) : 0;
      const pCls = pctClass(targetPct);
      return `
        <div class="team-card t${i + 1}">
          <div class="team-name">
            <span>${escapeHtml(teamName)}</span>
            <span class="team-sdr-count">${t.sdrCount} SDR${t.sdrCount === 1 ? '' : 's'}</span>
          </div>
          ${metricBlock('Booked',    'booked',    t.booked)}
          ${metricBlock('Qualified', 'qualified', t.qualified)}
          <div class="team-target">
            <div class="team-target-header">
              <span class="team-target-label">Target Progress</span>
              <span class="team-target-pct ${pCls.replace('pct-','')}">${targetPct}%</span>
            </div>
            <div class="team-target-bar">
              <div class="team-target-bar-fill" style="width: ${Math.min(targetPct, 100)}%"></div>
            </div>
            <div class="team-target-detail">${t.qualified.m} / ${t.monthlyTarget} this month</div>
          </div>
        </div>
      `;
    }).join('');
    document.getElementById('teams').innerHTML = html;
  }

  function metricBlock(label, cssClass, vals) {
    return `
      <div class="metric-block ${cssClass}">
        <div class="metric-label">${label}</div>
        <div class="metric-row">
          <div class="metric-cell">
            <div class="metric-value">${vals.d}</div>
            <div class="metric-period">Today</div>
          </div>
          <div class="metric-cell dim">
            <div class="metric-value">${vals.w}</div>
            <div class="metric-period">Week</div>
          </div>
          <div class="metric-cell dim">
            <div class="metric-value">${vals.m}</div>
            <div class="metric-period">Month</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderLeaderboard() {
    const sorted = [...(data.sdrs || [])]
      .map(s => ({
        name: s.name,
        team: s.team,
        value: s.qualified.m,
        scheduled: s.booked.m || 0,
        booked: s.booked.m || 0,
        target: s.monthlyTarget || 0,
        pct: s.monthlyTarget > 0 ? Math.round((s.qualified.m / s.monthlyTarget) * 100) : 0
      }))
      .sort((a, b) => {
        if (b.value !== a.value) return b.value - a.value;
        if (b.booked !== a.booked) return b.booked - a.booked;
        return a.name.localeCompare(b.name);
      })
      .slice(0, LEADERBOARD_SIZE);

    if (!sorted.length) {
      document.getElementById('leaderboard').innerHTML =
        '<div class="empty">No qualified demos yet this month</div>';
      return;
    }

    // Dynamically size the grid: 2 columns, rows = ceil(count / 2).
    // This makes the leaderboard fit any number of SDRs without spillover.
    const rowCount = Math.ceil(sorted.length / 2);
    document.getElementById('leaderboard').style.gridTemplateRows = `repeat(${rowCount}, 1fr)`;

    const rankClass = i => i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    document.getElementById('leaderboard').innerHTML = sorted.map((s, i) => {
      const pCls = pctClass(s.pct);
      const barWidth = Math.min(s.pct, 100);
      return `
        <div class="lb-row ${pCls}">
          <div class="lb-rank ${rankClass(i)}">${i + 1}</div>
          <div class="lb-name-block">
            <div class="lb-name">${escapeHtml(s.name)}</div>
            <div class="lb-team">${escapeHtml(s.team)}</div>
          </div>
          <div class="lb-progress-bar">
            <div class="lb-progress-fill" style="width: ${barWidth}%"></div>
          </div>
          <div class="lb-pct">${s.pct}%</div>
          <div class="lb-scheduled" title="Scheduled this month">${s.scheduled}</div>
          <div>
            <div class="lb-value">${s.value}</div>
            <div class="lb-target">/ ${s.target}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  fetchData();
  setInterval(fetchData, REFRESH_SECONDS * 1000);
</script>
</body>
</html>
